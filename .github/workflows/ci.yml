name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Build
        run: go build -o slimemold .

      - name: Unit tests
        run: go test ./... -count=1 -timeout 5m

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          # Pin, don't float. `latest` silently floats (e.g. 2.11.4 -> 2.12.2),
          # which (a) makes CI un-reproducible against the local pre-push gate
          # and (b) skews the restored analysis cache across versions, emitting
          # phantom findings on code the commit never touched. Bump deliberately.
          version: v2.12.2
